<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button class="corner-btn left" id="openBookmarksBtn" title="App Library"><i class="fas fa-layer-group"></i></button>
  <button class="corner-btn right" id="openSettingsBtn" title="Settings"><i class="fas fa-sliders-h"></i></button>

  <div class="container">
    <div class="main-panel-content">
      <div class="clock-panel" id="clockPanel">
        <div class="time" id="timeDisplay">12:34</div>
        <div class="date" id="dateDisplay">Monday, January 1</div>
      </div>

      <div class="search-container">
        <form id="search-form">
          <div class="search-engine-toggle" id="searchEngineToggle" title="Change Search Engine">
            <span id="currentEngineName">DuckDuckGo</span>
          </div>
          <div class="search-divider"></div>
          <input type="text" id="search-input" placeholder="Search the web or type a URL" autocomplete="off" autofocus>
          <button type="submit" id="searchSubmitBtn"><i class="fas fa-search"></i></button>
          <div class="search-suggestions" id="searchSuggestions"></div>
        </form>

        <div class="search-dropdown" id="searchDropdown">
          <div id="engineOptionsList"></div>
          <div class="add-engine-mini">
            <input type="text" id="newEngineName" placeholder="Name (e.g. YouTube)">
            <input type="url" id="newEngineQuery" placeholder="URL (https://youtube.com/results?search_query=)">
            <button type="button" id="addEngineBtn"><i class="fas fa-plus"></i></button>
          </div>
        </div>
      </div>

      <div class="bookmarks-grid" id="favoritesGrid"></div>
    </div>
  </div>

  <aside class="sidebar left-sidebar" id="bookmarksSidebar">
    <button class="edge-toggle-btn" id="closeBookmarksBtn"><i class="fas fa-chevron-left"></i></button>
    
    <div class="sidebar-content">
      <div class="sidebar-header">
        <h2>App Library</h2>
      </div>

      <div class="library-content-wrapper">
        <div class="library-controls-minimal">
          <input type="text" id="librarySearch" placeholder="Find apps...">
          <button class="minimal-btn" id="editModeToggle" title="Edit apps">
            <i class="fas fa-pen"></i>
          </button>
          <button class="minimal-btn" id="toggleAddPanelBtn" title="Add new app/site">
            <i class="fas fa-plus"></i>
          </button>
          <div class="minimal-toggles">
            <button class="minimal-btn active" id="btnViewGridMinimal" title="Grid View"><i class="fas fa-th"></i></button>
            <button class="minimal-btn" id="btnViewListMinimal" title="List View (A-Z)"><i class="fas fa-list"></i></button>
          </div>
        </div>

        <div id="addPanelCollapsible" style="display: none;">
          <div class="add-app-panel">
            <h3 class="add-panel-header"><i class="fas fa-plus-circle"></i> Add App / Site</h3>
            <div class="minimal-form">
              <input type="text" id="newBookmarkName" placeholder="Name (e.g., GitHub)">
              <input type="url" id="newBookmarkUrl" placeholder="URL (https://github.com)">
              <button class="minimal-add-btn" id="addBookmarkBtn">Add</button>
            </div>
          </div>
        </div>

        <div class="all-bookmarks-container" id="allBookmarksContainer"></div>
      </div>
    </div>
  </aside>

  <aside class="sidebar right-sidebar" id="settingsSidebar">
    <button class="edge-toggle-btn" id="closeSettingsBtn"><i class="fas fa-chevron-right"></i></button>

    <div class="sidebar-content">
      <div class="sidebar-header">
        <h2>Settings</h2>
      </div>

      <div class="settings-section">
        <h3><i class="fas fa-clock"></i> Modular Clock</h3>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="clockEnableToggle" checked>
          <label for="clockEnableToggle">Enable clock</label>
        </div>
        
        <div class="clock-options" id="clockOptions">
          <div class="form-group slider-group">
            <label>Clock Size (<span id="clockScaleVal">1.0</span>x)</label>
            <input type="range" id="clockScaleSlider" min="0.5" max="2.0" step="0.1" value="1">
          </div>
          <div class="form-group">
            <label>Clock Format</label>
            <div class="segmented-control">
              <input type="radio" name="clockFormatToggle" id="format12" value="12h" checked>
              <label for="format12">12-hour</label>
              <input type="radio" name="clockFormatToggle" id="format24" value="24h">
              <label for="format24">24-hour</label>
            </div>
          </div>
          <div class="form-group">
            <label>Clock Color Mode</label>
            <div class="segmented-control">
              <input type="radio" name="clockColorMode" id="clockColorAuto" value="auto" checked>
              <label for="clockColorAuto">Auto</label>
              <input type="radio" name="clockColorMode" id="clockColorManual" value="manual">
              <label for="clockColorManual">Manual</label>
            </div>
          </div>
          <div class="form-group" id="clockManualColorGroup" style="display: none;">
            <input type="color" id="clockManualColor" value="#eef2f5">
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h3><i class="fas fa-search"></i> Search Options</h3>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="searchSuggestionsToggle" checked>
          <label for="searchSuggestionsToggle">Enable search suggestions</label>
        </div>
      </div>

      <div class="settings-section">
        <h3><i class="fas fa-palette"></i> Theme & Background</h3>
        
        <div class="form-group">
          <label>Background Type</label>
          <select id="bgType">
            <option value="gradient">Gradient</option>
            <option value="image" selected>Image (URL or Local)</option>
            <option value="upload">Upload image</option>
            <option value="color">Solid color</option>
          </select>
        </div>

        <div class="form-group" id="gradientGroup" style="display: none;">
          <label>Gradient preset</label>
          <select id="bgPreset">
            <option value="linear-gradient(145deg, #1a2f3f 0%, #1e4b5e 100%)">Deep sea</option>
            <option value="linear-gradient(145deg, #202c3a 0%, #2c4c6b 100%)">Charcoal steel</option>
            <option value="linear-gradient(145deg, #1b2b40 0%, #1d4e6f 100%)">Night water</option>
            <option value="linear-gradient(145deg, #232b32 0%, #2f4f5f 100%)">Slate</option>
          </select>
        </div>

        <div class="form-group" id="customColorGroup" style="display: none;">
          <input type="color" id="customColor" value="#1a2f3f">
        </div>

        <div class="form-group" id="imageUrlGroup">
          <input type="text" id="bgImageUrl" placeholder="URL or local path (e.g., default.png)">
        </div>

        <div class="form-group" id="uploadGroup" style="display: none;">
          <input type="file" id="bgImageUpload" accept="image/*">
          <div class="image-preview" id="imagePreview" style="display: none;"></div>
        </div>

        <div class="form-group checkbox-group" style="margin-top: 1rem;">
          <input type="checkbox" id="autoThemeToggle" checked>
          <label for="autoThemeToggle">Auto Accent Color</label>
        </div>
        
        <div class="form-group" id="accentColorPickerGroup" style="display: none;">
          <input type="color" id="manualAccentColor" value="#5c85d6">
        </div>

        <div class="form-group slider-group" style="margin-top: 1.5rem;">
          <label>Acrylic Blur (<span id="acrylicBlurVal">16px</span>)</label>
          <input type="range" id="acrylicBlurSlider" min="0" max="64" step="1" value="16">
        </div>
      </div>

      <div class="settings-section">
        <h3><i class="fas fa-layer-group"></i> Panel Appearance</h3>
        <div class="form-group">
          <label>Panel Color Mode</label>
          <div class="segmented-control">
            <input type="radio" name="panelColorMode" id="panelColorAuto" value="auto" checked>
            <label for="panelColorAuto">Auto</label>
            <input type="radio" name="panelColorMode" id="panelColorManual" value="manual">
            <label for="panelColorManual">Manual</label>
          </div>
        </div>
        <div class="form-group" id="panelManualColorGroup" style="display: none;">
          <input type="color" id="panelManualColor" value="#14191e">
        </div>
        <div class="form-group slider-group">
          <label>Panel Opacity (<span id="panelOpacityVal">0.40</span>)</label>
          <input type="range" id="panelOpacitySlider" min="0" max="1" step="0.05" value="0.4">
        </div>
        <div class="form-group slider-group">
          <label>Panel Brightness (<span id="panelBrightnessVal">1.0</span>x)</label>
          <input type="range" id="panelBrightnessSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
      </div>

      <div class="settings-section">
        <h3><i class="fas fa-compress"></i> Sizing & Scaling</h3>
        <div class="form-group slider-group">
          <label>UI Roundness (<span id="panelCurvatureVal">32px</span>)</label>
          <input type="range" id="panelCurvatureSlider" min="0" max="64" step="2" value="32">
        </div>
        
        <div class="form-group checkbox-group">
          <input type="checkbox" id="syncScaleToggle" checked>
          <label for="syncScaleToggle">Sync scales</label>
        </div>

        <div class="scale-sliders">
          <div class="form-group slider-group">
            <label>Panel Scale (<span id="panelScaleVal">1.0</span>x)</label>
            <input type="range" id="panelScale" min="0.7" max="1.5" step="0.1" value="1">
          </div>
          <div class="form-group slider-group">
            <label>Icon Scale (<span id="iconScaleVal">1.0</span>x)</label>
            <input type="range" id="iconScale" min="0.5" max="2.0" step="0.1" value="1">
          </div>
        </div>
      </div>
    </div>
  </aside>

  <div class="edit-modal" id="editBookmarkModal" style="display: none;">
    <div class="edit-modal-content">
      <h3>Edit Bookmark</h3>
      <div class="form-group" style="margin-bottom: 0.8rem;">
        <input type="text" id="editBookmarkName" placeholder="Name (e.g., GitHub)">
      </div>
      <div class="form-group" style="margin-bottom: 0.8rem;">
        <input type="url" id="editBookmarkUrl" placeholder="URL (https://github.com)">
      </div>
      
      <div class="form-group" style="margin-bottom: 0.8rem; display: flex; gap: 8px; align-items: center;">
        <input type="url" id="editBookmarkIcon" placeholder="Custom Icon URL (Optional)" style="flex: 1;">
        <button id="uploadIconBtn" class="minimal-btn" title="Upload Local Icon" style="width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: var(--radius-md);"><i class="fas fa-upload"></i></button>
        <input type="file" id="editBookmarkIconFile" accept="image/*" style="display: none;">
      </div>
      
      <div id="editBookmarkIconPreviewWrapper" style="position:relative; display:none; width: 60px; margin-bottom: 1rem;">
        <div class="image-preview" id="editBookmarkIconPreview" style="height: 60px; width: 60px; border-radius: var(--radius-md); background-size: contain; background-repeat: no-repeat; background-position: center; background-color: rgba(0,0,0,0.2); margin: 0;"></div>
        <button id="removeCustomIconBtn" title="Remove Uploaded Icon" style="position:absolute; top:-5px; right:-5px; background:#ff8a8a; color:#1a1e24; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:10px;"><i class="fas fa-times"></i></button>
      </div>

      <div class="edit-modal-actions">
        <button id="cancelEditBtn">Cancel</button>
        <button id="saveEditBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <canvas id="colorCanvas" style="display:none;"></canvas>

  <script src="script.js"></script>
</body>
</html>
